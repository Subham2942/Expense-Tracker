services:
  mysql:
    image: mysql:8.0
    container_name: mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:8.0.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.service
      args:
        JAR_FILE: Jars/authService-0.0.1-SNAPSHOT.jar
    container_name: auth-service
    ports:
      - "9898:9898"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: auth_service
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_KAFKA_PRODUCER_BOOTSTRAP_SERVERS: kafka:29092

  user-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.service
      args:
        JAR_FILE: Jars/userService-0.0.1-SNAPSHOT.jar
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: user_service
      MYSQL_USER: root
      MYSQL_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  expense-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.service
      args:
        JAR_FILE: Jars/expenseService-0.0.1-SNAPSHOT.jar
    container_name: expense-service
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: expense_service
      MYSQL_USER: root
      MYSQL_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8082"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ds-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.ds-service
    container_name: ds-service
    ports:
      - "3000:3000"
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - ../dsService/.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  kong:
    image: kong:3.9
    container_name: kong
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      expense-service:
        condition: service_healthy
      ds-service:
        condition: service_started
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000" # public gateway
      - "8001:8001" # admin API, local only
    volumes:
      - ./config/kong.yml:/kong/declarative/kong.yml

volumes:
  mysql_data:
